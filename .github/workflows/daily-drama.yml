name: Daily Drama Video Generation

on:
  schedule:
    # 毎日 06:00 UTC = 15:00 JST（18:00公開に間に合うよう3時間前に実行）
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      theme:
        description: 'ドラマのテーマ（空欄でAI自動選択）'
        required: false
        type: string

concurrency:
  group: drama-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start VOICEVOX (if not running)
        run: |
          if ! curl -s http://localhost:50021/version > /dev/null 2>&1; then
            echo "VOICEVOX is not running. Please start it manually."
            exit 1
          fi

      - name: Generate and Upload Drama Video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KIEAI_API_KEY: ${{ secrets.KIEAI_API_KEY }}
          VOICEVOX_URL: http://localhost:50021
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          THEME="${{ github.event.inputs.theme }}"
          if [ -z "$THEME" ]; then
            python main.py --auto --upload
          else
            python main.py --theme "$THEME" --upload
          fi

      - name: Cleanup old generated files (keep 7 days)
        if: always()
        run: |
          find generated/ -maxdepth 1 -type d -mtime +7 -exec rm -rf {} + 2>/dev/null || true
